name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm --filter app tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate latest.json
        shell: pwsh
        run: |
          $conf = Get-Content app/src-tauri/tauri.conf.json | ConvertFrom-Json
          $version = $conf.version
          $repo = "${{ github.repository }}"
          $tag  = "${{ github.ref_name }}"
          $base = "https://github.com/$repo/releases/download/$tag"

          $nsisExe = Get-ChildItem "app/src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $nsisExe) {
            Write-Host "::warning::Aucun installeur NSIS trouvé — latest.json non généré"
            exit 0
          }

          $sigPath = "$($nsisExe.FullName).sig"
          if (-not (Test-Path $sigPath)) {
            Write-Host "::warning::Signature manquante ($sigPath) — TAURI_SIGNING_PRIVATE_KEY secret absent ? latest.json non généré"
            exit 0
          }

          $sig = (Get-Content $sigPath -Raw).Trim()
          $encodedName = [Uri]::EscapeDataString($nsisExe.Name)

          $manifest = [ordered]@{
            version   = $version
            notes     = "Voir https://github.com/$repo/releases/tag/$tag"
            pub_date  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = "$base/$encodedName"
              }
            }
          }

          $json = $manifest | ConvertTo-Json -Depth 5
          Set-Content -Path latest.json -Value $json -Encoding utf8 -NoNewline
          Write-Host "== latest.json =="
          Get-Content latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Dofus Companion ${{ github.ref_name }}"
          body: |
            ## Installation

            Téléchargez l'installeur **NSIS** (recommandé, plus léger) ou **MSI**.

            **Première installation :** lancez le setup, acceptez WebView2 si demandé (composant Microsoft standard).
            **Mise à jour :** l'application détecte et installe automatiquement les nouvelles versions au démarrage.

            > Windows SmartScreen peut afficher un avertissement (binaire non signé avec certificat EV) — cliquer "Informations complémentaires" puis "Exécuter quand même".

            ---
            [README](https://github.com/${{ github.repository }}#readme) · [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/scraper/output/CHANGELOG-DATA.md)
          files: |
            app/src-tauri/target/release/bundle/msi/*.msi
            app/src-tauri/target/release/bundle/msi/*.msi.sig
            app/src-tauri/target/release/bundle/nsis/*-setup.exe
            app/src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            latest.json
