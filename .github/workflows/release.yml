name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  # The release target repo is intentionally separate from this private
  # source repo. The auto-updater (tauri.conf.json) and the website
  # changelog both fetch from RELEASES_REPO.
  RELEASES_REPO: noureddinestam/dofus-companion-releases

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      # Needed to fire the repository_dispatch ping back to this repo so
      # update-release-fallback.yml runs without waiting for the daily cron.
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm --filter app tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate latest.json
        shell: pwsh
        run: |
          $conf = Get-Content app/src-tauri/tauri.conf.json | ConvertFrom-Json
          $version = $conf.version
          $repo = "${{ env.RELEASES_REPO }}"
          $tag  = "${{ github.ref_name }}"
          $base = "https://github.com/$repo/releases/download/$tag"

          $nsisExe = Get-ChildItem "app/src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $nsisExe) {
            Write-Host "::warning::Aucun installeur NSIS trouvé — latest.json non généré"
            exit 0
          }

          $sigPath = "$($nsisExe.FullName).sig"
          if (-not (Test-Path $sigPath)) {
            Write-Host "::warning::Signature manquante ($sigPath) — TAURI_SIGNING_PRIVATE_KEY secret absent ? latest.json non généré"
            exit 0
          }

          $sig = (Get-Content $sigPath -Raw).Trim()
          # GitHub remplace les espaces par des points à l'upload des assets de release
          $uploadedName = $nsisExe.Name -replace ' ', '.'
          $encodedName = [Uri]::EscapeDataString($uploadedName)

          $manifest = [ordered]@{
            version   = $version
            notes     = "Voir https://github.com/$repo/releases/tag/$tag"
            pub_date  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = "$base/$encodedName"
              }
            }
          }

          $json = $manifest | ConvertTo-Json -Depth 5
          Set-Content -Path latest.json -Value $json -Encoding utf8 -NoNewline
          Write-Host "== latest.json =="
          Get-Content latest.json

      - name: Generate SHA256SUMS.txt
        shell: pwsh
        run: |
          $outputPath = "SHA256SUMS.txt"
          $patterns = @(
            "app/src-tauri/target/release/bundle/nsis/*-setup.exe",
            "app/src-tauri/target/release/bundle/msi/*.msi"
          )
          $lines = @()
          foreach ($pattern in $patterns) {
            Get-ChildItem $pattern -ErrorAction SilentlyContinue | ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
              # GitHub replaces spaces with dots in uploaded asset names
              $uploadedName = $_.Name -replace ' ', '.'
              # sha256sum(1) format: "<hash>  <filename>"
              $lines += "${hash}  ${uploadedName}"
            }
          }
          if ($lines.Count -eq 0) {
            Write-Host "::warning::Aucun artefact trouvé — SHA256SUMS.txt non généré"
            exit 0
          }
          Set-Content -Path $outputPath -Value ($lines -join "`n") -Encoding utf8
          Write-Host "== SHA256SUMS.txt =="
          Get-Content $outputPath

      - name: Create GitHub Release (on releases repo)
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_PAT }}
          tag_name: ${{ github.ref_name }}
          target_commitish: main
          name: "Dofus Companion ${{ github.ref_name }}"
          body: |
            ## Installation

            Téléchargez l'installeur **NSIS** (recommandé, plus léger) ou **MSI**.

            **Première installation :** lancez le setup, acceptez WebView2 si demandé (composant Microsoft standard).
            **Mise à jour :** l'application détecte et installe automatiquement les nouvelles versions au démarrage.

            > Windows SmartScreen peut afficher un avertissement (binaire non signé avec certificat EV) — cliquer "Informations complémentaires" puis "Exécuter quand même".

            **Intégrité :** vérifiable depuis `SHA256SUMS.txt` attaché à cette release, ou `Get-FileHash <fichier> -Algorithm SHA256` en PowerShell.

            ---
            [Site officiel](https://dofuscompanion.com) · [Changelog](https://dofuscompanion.com/changelog) · [Retours](https://dofuscompanion.com/retours)
          files: |
            app/src-tauri/target/release/bundle/msi/*.msi
            app/src-tauri/target/release/bundle/msi/*.msi.sig
            app/src-tauri/target/release/bundle/nsis/*-setup.exe
            app/src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            latest.json
            SHA256SUMS.txt

      - name: Notify website to refresh release fallback
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          # Pings the parent workflow update-release-fallback.yml via repository_dispatch.
          # Failure here is non-fatal: the website also runs a daily cron failsafe.
          try {
            $body = @{ event_type = "new-release" } | ConvertTo-Json
            Invoke-RestMethod `
              -Uri "https://api.github.com/repos/${{ github.repository }}/dispatches" `
              -Method Post `
              -Headers @{
                Authorization = "Bearer $env:GH_TOKEN"
                Accept = "application/vnd.github+json"
                "X-GitHub-Api-Version" = "2022-11-28"
              } `
              -Body $body `
              -ContentType "application/json"
            Write-Host "Dispatch sent."
          } catch {
            Write-Host "::warning::repository_dispatch failed (non-fatal): $_"
          }
