name: CI · App

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'web/**'
      - '.github/workflows/ci-web.yml'
      - '.github/workflows/update-release-fallback.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'web/**'
      - '.github/workflows/ci-web.yml'
      - '.github/workflows/update-release-fallback.yml'

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # --ignore-scripts évite le postinstall de @tauri-apps/cli qui appelle cargo
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm --filter app typecheck
      - run: pnpm --filter scraper typecheck
      - run: pnpm --filter app lint
      - run: pnpm --filter scraper lint

  build-windows:
    runs-on: windows-latest
    needs: lint-typecheck
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter app tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
