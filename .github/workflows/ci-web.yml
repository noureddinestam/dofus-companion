name: CI · Web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-web.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-web.yml'

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        working-directory: web
        run: pnpm run format:check

      - name: Lint
        working-directory: web
        run: pnpm run lint

      - name: Typecheck
        working-directory: web
        run: pnpm run typecheck

      - name: Test
        working-directory: web
        run: pnpm run test

      - name: Build
        working-directory: web
        run: pnpm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://dofuscompanion.com
